{*** [위젯] 푸드케어 레터 홈 섹션 (모바일) | mobile/magazine/_magazine_home.html ***}
<section class="home-magazine">
	<h2 class="home-contents__title">
		<span>메디쏠라 이야기</span>
	</h2>

	{? hasMagazines}
	<div class="swiper-container home-magazine__swiper">
			<div class="swiper-wrapper">
			{@ magazines}
			<div class="swiper-slide">
			<div class="magazine_card_mobile" onclick="location.href='/magazine/view.php?id={=.articleId}'">
					{? .imageUrl}
					<div class="magazine_image_mobile">
							<h3>{=.subject}</h3>
							<img src="{=.imageUrl}" alt="{=.subject}" loading="lazy">
					</div>
					{/}
					<!-- <div class="magazine_content_mobile">
							<h3>{=.subject}</h3>
							<p>{=.summary}</p>
					</div> -->
			</div>
			</div>
			{/}
			</div>
	</div>

	<div class="home-view-more">
			<a href="/magazine/list.php">매거진 더보기 &gt;</a>
	</div>
	{/}
</section>

<script type="text/javascript">
(function() {
	var $targets = $('.home-magazine__swiper').filter(function() {
			return !$(this).attr('data-swiper-init');
	});

	if (!$targets.length || typeof Swiper === 'undefined') {
			return;
	}

	$targets.each(function() {
	$(this).attr('data-swiper-init', 'true');
	new Swiper(this, {
			slidesPerView: 1.25,
			spaceBetween: 6,
			// freeMode: true,
			watchOverflow: true,
			loop: true,
			centeredSlides: true
	});
	});
})();
</script>
