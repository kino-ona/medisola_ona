            <div class="card-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
            </div>
            <div class="card-toggle-text">
              <p class="card-title">메디쏠라 영양 제안</p>
              <p class="card-subtitle">맞춤 케어 솔루션</p>
            </div>
          </div>
          <div class="card-chevron">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </button>

        <!-- Expandable Content -->
        <div class="card-content">
          <div class="card-body" id="suggestionContent">
            <!-- JS에서 동적 렌더링 -->
          </div>
        </div>
      </div>
    </section>

    <!-- Quantity Selector (V0 스타일) -->
    <section class="mobile-quantity-section">
      <div class="quantity-selector" id="mobileQuantitySelector">
        <!-- JS에서 서버 옵션 기반 동적 생성 -->
      </div>
    </section>

    <!-- Selected Preview (V0 스타일 - Sticky + Backdrop Blur) -->
    <div class="selected-preview">
      <div class="preview-header">
        <span class="preview-title">선택한 메뉴</span>
        <span class="preview-count" id="mobileSelectedCount"><span id="mobileCurrentCount">0</span> / <span id="mobileTotalCount">10</span></span>
      </div>
      <div id="mobileSelectedItems" class="selected-items scrollbar-hide">
        <div class="empty-message" id="mobileEmptyMessage">아래 메뉴를 터치하여 추가하세요</div>
      </div>
    </div>

    <!-- Menu Sections -->
    <div id="menuSections" class="menu-sections">
      <!-- JS에서 동적 생성 -->
      <div class="loading-message" style="text-align:center; padding:2rem; color:#64748b;">
        메뉴를 불러오는 중...
      </div>
    </div>

  </main>

  <!-- Mobile Bottom CTA (V0 스타일) -->
  <div class="bottom-cta">
    <p class="cta-count"><span id="mobileCtaTotalCount">10</span>식 중 <span class="cta-count-highlight" id="mobileCtaSelectedCount">0</span>식 선택됨</p>
    <button id="mobileCtaButton" class="cta-btn" disabled onclick="CustomDietBuilder.showSummary()">
      <span>식단 선택 완료</span>
      <svg id="mobileCtaCheckIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M20 6 9 17l-5-5"/></svg>
    </button>
  </div>

  <!-- Advanced Filters Modal (V0 스타일) -->
  <div id="advancedFiltersModal" class="advanced-modal" style="display:none;" onclick="CustomDietBuilder.hideAdvancedFilters()">
    <div class="advanced-modal-content" onclick="event.stopPropagation()">
      <!-- Header -->
      <div class="advanced-modal-header">
        <h2 class="advanced-modal-title">고급 옵션</h2>
        <button class="advanced-close-btn" onclick="CustomDietBuilder.hideAdvancedFilters()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <!-- Filters Body -->
      <div class="advanced-modal-body">
        <!-- Protein Slider -->
        <div class="filter-group">
          <div class="filter-header">
            <label class="filter-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
              최소 단백질
            </label>
            <span class="filter-value-display"><span id="proteinValue">0</span>g 이상</span>
          </div>
          <input type="range" id="filterProtein" class="filter-slider" min="0" max="40" step="1" value="0" oninput="CustomDietBuilder.updateFilterValue('protein', this.value)">
          <div class="filter-range-labels">
            <span>0g</span>
            <span>40g</span>
          </div>
        </div>

        <!-- Sodium Slider -->
        <div class="filter-group">
          <div class="filter-header">
            <label class="filter-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></svg>
              최대 나트륨
            </label>
            <span class="filter-value-display"><span id="sodiumValue">700</span>mg 이하</span>
          </div>
          <input type="range" id="filterSodium" class="filter-slider" min="200" max="700" step="10" value="700" oninput="CustomDietBuilder.updateFilterValue('sodium', this.value)">
          <div class="filter-range-labels">
            <span>200mg</span>
            <span>700mg</span>
          </div>
        </div>

        <!-- Calories Slider -->
        <div class="filter-group">
          <div class="filter-header">
            <label class="filter-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
              최대 칼로리
            </label>
            <span class="filter-value-display"><span id="caloriesValue">700</span>kcal 이하</span>
          </div>
          <input type="range" id="filterCalories" class="filter-slider" min="300" max="700" step="10" value="700" oninput="CustomDietBuilder.updateFilterValue('calories', this.value)">
          <div class="filter-range-labels">
            <span>300kcal</span>
            <span>700kcal</span>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="advanced-modal-actions">
        <button class="btn-reset" onclick="CustomDietBuilder.resetFilters()">초기화</button>
        <button class="btn-apply" onclick="CustomDietBuilder.applyFilters()">적용하기</button>
      </div>
    </div>
  </div>

</div>

<!-- ====== MENU DETAIL MODAL (V0 Bottom Sheet) ====== -->

          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div style="margin-top:-48px;" class="detail-product-image-wrap">

    <div class="modal-footer">
      <div class="qty-control">
        <button class="qty-btn" id="detailQtyMinus" onclick="CustomDietBuilder.adjustDetailQty(-1)">

          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </button>
      </div>
      <button class="btn-confirm" onclick="CustomDietBuilder.closeDetail()">
        <span id="detailConfirmText">선택 안 함</span>
      </button>
    </div>
  </div>
</div>

<!-- ★★★ 기존 주문 프로세스 Form (layer_option.html 구조 그대로) ★★★ -->
<form id="frmView" name="frmView" method="post" action="../order/cart_ps.php">
  <!-- 기본 정보 -->
  <input type="hidden" name="mode" value="cartIn" />
  <input type="hidden" name="cartMode" value="" />
  <input type="hidden" name="scmNo" value="{=goodsView['scmNo']}" />
  <input type="hidden" name="goodsNo[]" value="{=goodsView['goodsNo']}" />

  <!-- 옵션 정보 (10식/20식/40식) -->
  <input type="hidden" name="optionSno[]" id="optionSno" value="" />
  <input type="hidden" name="goodsCnt[]" value="1" />

  <!-- 가격 정보 -->
  <input type="hidden" name="goodsPriceSum[]" id="goodsPriceSum" value="0" />
  <input type="hidden" name="addGoodsPriceSum[]" id="addGoodsPriceSum" value="0" />
  <input type="hidden" name="set_total_price" id="setTotalPrice" value="0" />
  <input type="hidden" name="isDefaultComponents[]" value="0" />

  <!-- 배송 정보 -->
  <input type="hidden" name="deliveryCollectFl" value="pre" />
  <input type="hidden" name="useBundleGoods" value="1" />

  <!-- ★ componentGoods 동적 생성 영역 (JS에서 채워짐) ★ -->
  <div id="componentGoodsInputs">
    <!-- CustomDietBuilder.buildFormInputs()에서 생성 -->
  </div>
  <div id="addGoodsInputs"></div>
</form>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../js/nutrition-config.js?v=3"></script>
<script src="../js/custom-diet-builder.js?v=10"></script>
<script>
// ★ 초기화 ★
$(document).ready(function() {
  // 디버깅: 데이터 확인
  console.log('[CustomDiet] goodsNo:', '{=goodsView.goodsNo}');
  console.log('[CustomDiet] menuItemsCount:', '{=menuItemsCount}');

  // 디버깅: PHP에서 전달된 addGoods 구조 확인
  var _debugInfo = {?debugInfo}{=debugInfo}{:}null{/};
  console.log('[CustomDiet] debugInfo (PHP addGoods 구조):', _debugInfo);

  // JSON 데이터 (서버에서 전달)
  var _menuData = {=addGoodsNutritionJson};
  var _options = {=optionsJson};

  console.log('[CustomDiet] menuData:', _menuData);

  var _premiumAddGoods = {?premiumAddGoodsJson}{=premiumAddGoodsJson}{:}null{/};

  CustomDietBuilder.init({
    goodsNo: '{=goodsView.goodsNo}',
    goodsPrice: {=goodsView.goodsPrice},
    menuData: _menuData || [],
    options: _options || [],
    premiumAddGoods: _premiumAddGoods,
    {?conditionsJson}
    conditions: {=conditionsJson},
    {/}
    {?userDataJson}
    userData: {=userDataJson},
    {/}
    {?recommendedLinesJson}
    recommendedLines: {=recommendedLinesJson},
    {/}
    {?recommendedDiseaseDietsJson}
    recommendedDiseaseDiets: {=recommendedDiseaseDietsJson},
    {/}
  });
});
</script>
