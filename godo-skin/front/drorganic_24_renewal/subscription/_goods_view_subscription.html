<script>
$(function() {
    $(".subscription_type_box label").click(function() {
        var v = $(this).data('type');
        if (v == '1') {
            $(".onetime_buy").hide();
            $(".subscription_buy, .subscription_selection").fadeIn();
        } else {
            $(".subscription_buy, .subscription_selection").hide();
            $(".onetime_buy").fadeIn();
        }
    });
    
    $(".subscription_selection .sel_period").click(function() {
        $(".subscription_selection .sel_period").removeClass("on");
        $(this).addClass("on");
        var period = $(this).data("period");
        $("#subscription_period").val(period);
    });
    
    $(".subscription_buy").click(function() {
        add_subscription_cart();
    });
    
    $('.btn_subscriptionconfirm').click(function(){
		location.href = '../subscription/cart.php';
        return false;
    });
	$(".subscription_type_box label").trigger("click");
});

function add_subscription_cart()
{
    <!--{ ? !gd_is_login() }-->
    alert("정기결제는 로그인이 필요한 서비스 입니다.");
    window.location.href='../member/login.php';
    return;
    <!--{ / }-->
    
    $('#frmView input[name=\'mode\']').val('cartIn');
    $('#frmView').attr('action','../subscription/cart_ps.php');
    
    <!--{ ? goodsView['optionFl'] == 'y'}-->
    var goodsInfo		= $('#frmView input[name*=\'optionSno[]\']').length;
    <!--{ : }-->
    var goodsInfo		= $('#frmView input[name="optionSnoInput"]').val();
    <!--{ / }-->

    if (goodsInfo == '') {
       alert('옵션을 선택해주세요!!');
       return false;
    }
    
    <!--{ ? gd_isset(goodsView['optionTextFl']) == 'y' }-->
    if(!goodsViewController.option_text_valid("#frmView"))
    {
        alert('입력 옵션을 확인해주세요.');
        return false;
    }
   <!--{ / }-->
    
    <!--{ ? goodsView['addGoods'] }-->
     //추가상품
     if(!goodsViewController.add_goods_valid("#frmView"))
     {
        alert('필수 추가 상품을 확인해주세요.');
        return false;
     }
     <!--{ / }-->
    
    var params = $( "#frmView" ).serialize();

    $.ajax({
        method: "POST",
        cache: false,
        url: "../subscription/cart_ps.php",
        data: params,
        success: function (data) {		
			if (data == '1') {
			<!--{ ? cartInfo.moveCartPageFl == 'y' }-->
				location.href="../subscription/cart.php";
            <!--{ : }-->
                $("#addSubCartLayer").removeClass('dn');
                $('#layerDim').removeClass('dn');
                $("#addSubCartLayer").find('> div').center();
            <!--{ / }-->
            } else {
				alert('정기결제 장바구니 담기에 실패하였습니다.');
            }
        },
        error: function (data) {
			alert(data.message);
        }
	});
}

const openBenefitLayer = async goodsNo => {

    const optionInputs = document.querySelectorAll("input[name='optionSno[]']");

    if (optionInputs.length === 0) {
        alert('옵션을 선택해주세요.');
        return;
    }

    const params = new URLSearchParams();

    // 옵션 sno & 해당 수량 추가
    optionInputs.forEach(function (el) {
        const optionSno = el.value;
        const tbody = el.closest('tbody');
        const qtyInput = tbody.querySelector("input[name='goodsCnt[]']");
        const qty = qtyInput ? qtyInput.value : 1;

        params.append("optionSno[]", optionSno);
        params.append("goodsCnt[" + optionSno + "]", qty);
    });

    params.append("mode", 'goodsBenefitCheck');
    params.append("goodsNo", goodsNo);



    try {
        const response = await fetch('../subscription/ajax.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
        });

        const result = await response.json();
        // console.log("비동기 결과:", result);

        if (Array.isArray(result)) {
            result.forEach(v => {
                params.append("cartSno[]", v);
            });
        }

        // ② 서버 체크 후 팝업 오픈
        wm.layer.popup(
            '../subscription/subscription_benefit.php?mode=benefitLayer&goodsNo='
            + goodsNo + '&' + params.toString(),
            500,
            300,
            true
        );

    } catch (e) {
        console.error("비동기 통신 오류:", e);
        alert('서버 통신 중 오류 발생');
    }


    // wm.layer.popup('../subscription/subscription_benefit.php?mode=benefitLayer&goodsNo=' + goodsNo + '&' + params.toString(), 500, 300, true);
}
</script>
