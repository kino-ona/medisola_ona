<style>
	#dateTime { margin: 10px 0; }
	#dateTime .calendar { padding: 10px; border: 1px solid #bbb; }
	#dateTime table { width: 100%; border-collapse: collapse; }
	#dateTime th { border-bottom: 1px solid #4da6ff; padding-bottom : 10px; font-size: 15px; }
	#dateTime td { text-align:center; padding: 10px 0; font-size: 15px; }
	#dateTime tr:nth-child(2) td { padding-top : 20px; }
	#dateTime td label.pointer { cursor: pointer; }
	#dateTime td label.not { color : #dbdbdb; }
	#dateTime td { position: relative; }
	#dateTime p { font-size :15px; }
	
	.calendar td .img_div {
		display:inline-block; position: absolute;
	}
	
	.calendar td img {
		width: 20px; height : 20px; position: relative; left: 5px;
	}

</style>

<div id="dateTime">
	<!--{ ? period }-->
	<div>
		<p>옵션과 기간을 선택한 후에 첫 배송일을 선택해주세요.</p>
	</div>
	
	<div class="calendar">
		<table>
			<tr>
				<th>월</th>
				<th>화</th>
				<th>수</th>
				<th>목</th>
				<th>금</th>
			</tr>
			<!--{ @ period['day']}-->
			<tr>
				<!--{ @ .value_ }-->
				<!--{ ? ..key_ != 0 && ..key_ != 6}-->
				<td>
					<input type="radio" name="firstDelivery" id="{=..value_}" value="{=..value_}" class="dn" <!--{ ? period['selectYoil'][.key_][..key_] == 'n'}-->disabled<!--{ / }-->>
					<label for="{=..value_}" class="pointer on" <!--{ ? period['selectYoil'][.key_][..key_] == 'n'}-->style="color : #ddd; cursor:context-menu;"<!--{ / }-->>{=..value_}</label>
					<div class="img_div">
						<img src="../img/wm/check.png" class="dn">
					</div>
				</td>
				<!--{ / }-->
				<!--{ / }-->
			</tr>
			<!--{ / }-->
		</table>
	</div>
	
	<div>
		<p>선택하신 첫 배송일은 당일 결제 기준이며, 가상계좌 및 무통장입금으로 인한 결제일이 변경될 경우, 첫 배송일이 변경 될 수 있습니다.</p>
	</div>
	<!--{ / }-->
</div>

<script type="text/javascript">
	$(function(){
		$('input[name=firstDelivery]').click(function(){
			var id = $(this).attr('id');
			
			$('input[name=firstDelivery]').each(function(e , index){
				var eachId = $(this).attr('id');
				if(id != eachId){
					$(this).parent().find('img').addClass('dn');
				}else{
					$(this).parent().find('img').removeClass('dn');
				}
			});

		});
	});
</script>
