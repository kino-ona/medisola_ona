{ # header }
<link rel="stylesheet" href="../css/diet-finder.css">
<link rel="stylesheet" href="../css/diet-finder-result.css">
<script src="../js/diet-finder-mock-data.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    if (window.isEnvDev) {
        $("body").css("padding-top", 0);
        $(".preview-title").remove();
    }

    $("#wrap").css("min-width", 1450);
    $("#mheader").css("min-width", 1450);
    $("#container").css("min-width", 1450);

    $("#mheader .mh_inner").css("justify-content", "space-between");
    $("#mheader .mh_inner > .mh_sec01").css("margin-right", 0);
    $("#mheader .mh_inner > .mh_sec03").css("margin", 0);

    $("#container #contents")
        .css("width", "100%")
        .css("max-width", "unset")
        .css("margin", 0)
        .css("padding", 0);

    $("#mfooter").css("margin", 0);
    $("iframe[src='/blank.php']").css("display", "none");
});
</script>

<main id="diet_finder_result">
    <!-- 헤더 섹션 -->
    <section class="df-header">
        <div class="df-container">
            <h1 class="df-title">나에게 맞는 식단 찾기 결과</h1>
            <p class="df-subtitle">고객님께 추천하는 맞춤 식단입니다</p>
        </div>
    </section>

    <!-- 추천 식단 섹션 -->
    <section class="dfr-recommended-diets">
        <div class="df-container">
            <h2 class="dfr-section-title">추천 식단 (Top 2)</h2>
            <p class="dfr-section-desc">고객님의 건강 목표와 생활 습관에 가장 잘 맞는 2가지 식단을 추천합니다</p>

            <!-- 로딩 상태 -->
            <div class="dfr-loading" id="dietLoading">
                <div class="dfr-spinner"></div>
                <p>맞춤 식단을 분석하고 있습니다...</p>
            </div>

            <!-- 식단 목록 -->
            <div class="dfr-diet-list" id="dietList" style="display: none;">
                <!-- JavaScript로 동적 생성 -->
            </div>
        </div>
    </section>

    <!-- 다시 하기 버튼 -->
    <section class="dfr-retry-section">
        <div class="df-container">
            <button class="dfr-btn-retry" onclick="retryQuiz()">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 10C15 7.23858 12.7614 5 10 5C7.23858 5 5 7.23858 5 10C5 12.7614 7.23858 15 10 15C11.1 15 12.1 14.7 13 14.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M15 7V10H12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                다시 진단하기
            </button>
        </div>
    </section>
</main>

<script src="../js/diet-finder-result.js"></script>
{ # footer }
